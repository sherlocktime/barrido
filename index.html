<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Barrido de Rendija</title>

    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#000000" />
    <link rel="apple-touch-icon" href="icon-192.png" />

    <style>
        :root { --bg: #000000; --border: rgba(255, 255, 255, 0.08); --accent: #ffcc00; --text: #ffffff; --muted: #8e8e93; --btn-bg: rgba(255, 255, 255, 0.08); --btn-hover: rgba(255, 255, 255, 0.15); --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: calc(16px + env(safe-area-inset-top, 16px)) 16px calc(16px + env(safe-area-inset-bottom, 16px)); background: var(--bg); color: var(--text); font-family: var(--font-main); min-height: 100vh; display: flex; flex-direction: column; align-items: center; gap: 16px; }
        h2 { margin: 0; font-size: 1.1rem; font-weight: 600; letter-spacing: 0.5px; text-align: center; }
        .video-container { position: relative; width: 70vw; max-width: 320px; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; display: flex; background: #000; }
        video { width: 100%; height: auto; display: block; }
        .slit-guide { position: absolute; top: 0; bottom: 0; left: 0%; width: 2px; background-color: var(--accent); box-shadow: 0 0 8px var(--accent); pointer-events: none; display: none; transition: left 0.05s linear; }
        .scanning .slit-guide { display: block; }
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 46px); gap: 10px; width: 100%; max-width: 400px; }
        button { font-family: inherit; font-weight: 600; color: var(--text); background: var(--btn-bg); border: 1px solid var(--border); height: 100%; border-radius: 10px; font-size: 13px; font-weight: 500; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; transition: background 0.15s, transform 0.1s, border-color 0.15s, color 0.15s; width: 100%; }
        button:active { transform: scale(0.97); background: var(--btn-hover); }
        #toggleBtn { font-size: 1.25rem; grid-row: span 2; }
        #toggleBtn.running { color: var(--accent); border-color: rgba(255, 204, 0, 0.3); background: rgba(255, 204, 0, 0.08); }
        #saveBtn { background: rgba(255, 255, 255, 0.12); }
        .status-panel { font-size: 11px; color: var(--muted); text-align: center; width: 100%; max-width: 400px; }
        .progress-bar { width: 100%; height: 4px; background-color: rgba(255, 255, 255, 0.1); border-radius: 2px; overflow: hidden; }
        #progress { width: 0%; height: 100%; background-color: var(--accent); transition: width 0.1s linear; }
        canvas { width: 100%; max-width: 500px; height: auto; border: 1px solid var(--border); background: black; border-radius: 12px; box-shadow: 0 12px 40px rgba(0, 0, 0, 0.7); }
        @media (orientation: landscape) { body { padding: calc(6px + env(safe-area-inset-top, 6px)) 16px calc(6px + env(safe-area-inset-bottom, 6px)); gap: 10px; } .video-container { width: 40vw; max-width: 240px; } .controls { grid-template-columns: repeat(5, 1fr); grid-template-rows: 38px; gap: 8px; max-width: 520px; } .controls button, #toggleBtn, #saveBtn { grid-column: span 1 !important; grid-row: span 1 !important; height: 100%; font-size: 12px; } #toggleBtn { font-size: 1.1rem; } .status-panel { max-width: 520px; } canvas { max-width: 450px; } }
    </style>
</head>

<body>

    <h2>Barrido de Rendija</h2>

    <div class="video-container" id="videoWrapper">
        <video id="video" autoplay playsinline muted></video>
        <div class="slit-guide" id="slitGuide"></div>
    </div>

    <div class="controls">
        <button id="toggleBtn">▶</button>
        <button id="speedBtn">1 px</button>
        <button id="dirBtn">Derecha</button>
        <button id="camBtn">Entorno</button>
        <button id="saveBtn">Guardar</button>
    </div>

    <div class="status-panel">
        <span id="statusTxt">Cargando cámara...</span>
        <div class="progress-bar" style="margin-top: 6px;">
            <div id="progress"></div>
        </div>
    </div>

    <canvas id="panorama" width="1920" height="1080"></canvas>

    <script>
        const video = document.getElementById("video");
        const videoWrapper = document.getElementById("videoWrapper");
        const slitGuide = document.getElementById("slitGuide");
        const pano = document.getElementById("panorama");
        const ctx = pano.getContext("2d", { alpha: false });
        const statusTxt = document.getElementById("statusTxt");
        const progress = document.getElementById("progress");
        const speedBtn = document.getElementById("speedBtn");
        const toggleBtn = document.getElementById("toggleBtn");
        const dirBtn = document.getElementById("dirBtn");
        const camBtn = document.getElementById("camBtn");

        let facingMode = "environment";
        let currentStream = null;
        let running = false;
        let xpos = 0;

        const speeds = [1, 2, 3, 4, 5];
        let speedIndex = 0;
        let sliceWidth = speeds[speedIndex];

        let sweepDirection = "right"; 

        function ajustarLienzo() {
            if (video.videoWidth) {
                pano.width = video.videoWidth;
                pano.height = video.videoHeight;
                ctx.fillStyle = "black";
                ctx.fillRect(0, 0, pano.width, pano.height);
            }
        }

        async function startCamera() {
            try {
                if (currentStream) {
                    currentStream.getTracks().forEach(track => track.stop());
                }

                currentStream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode,
                        width: { ideal: 1920 }, // 1280
                        height: { ideal: 1080 } // 720
                    }
                });

                video.srcObject = currentStream;
                video.onloadedmetadata = () => {
                    ajustarLienzo();
                    statusTxt.innerText = facingMode === "environment" ? "Cámara trasera lista." : "Cámara frontal lista.";
                };

            } catch (err) {
                statusTxt.innerText = "Error de cámara: " + err.message;
            }
        }

        function captureSlice() {
            if (!running) return;

            ctx.drawImage(video, xpos, 0, sliceWidth, video.videoHeight, xpos, 0, sliceWidth, pano.height);
            slitGuide.style.left = `${(xpos / video.videoWidth) * 100}%`;

            if (sweepDirection === "right") {
                xpos += sliceWidth;
                progress.style.width = `${(xpos / pano.width) * 100}%`;
                
                if (xpos >= pano.width) {
                    finalizarEscaneo();
                    return;
                }
            } else {
                xpos -= sliceWidth;
                progress.style.width = `${((pano.width - xpos) / pano.width) * 100}%`;
                
                if (xpos <= 0) {
                    finalizarEscaneo();
                    return;
                }
            }

            requestAnimationFrame(captureSlice);
        }

        function finalizarEscaneo() {
            running = false;
            videoWrapper.classList.remove("scanning");
            statusTxt.innerText = "¡Foto escaneada!";
            toggleBtn.innerText = "▶";
            toggleBtn.classList.remove("running");
            hacerRuido();
        }

        toggleBtn.onclick = () => {
            if (!video.videoWidth) return;

            if (running) {
                running = false;
                videoWrapper.classList.remove("scanning");
                statusTxt.innerText = "Pausado.";
                toggleBtn.innerText = "▷";
                toggleBtn.classList.remove("running");
                return;
            }

            if (sweepDirection === "right") {
                if (xpos <= 0 || xpos >= pano.width) {
                    ajustarLienzo();
                    xpos = 0;
                    progress.style.width = "0%";
                    slitGuide.style.left = "0%";
                }
            } else {
                if (xpos <= 0 || xpos >= pano.width) {
                    ajustarLienzo();
                    xpos = pano.width - sliceWidth;
                    progress.style.width = "0%";
                    slitGuide.style.left = "100%";
                }
            }

            running = true;
            videoWrapper.classList.add("scanning");
            statusTxt.innerText = "Escaneando...";
            toggleBtn.innerText = "□";
            toggleBtn.classList.add("running");

            captureSlice();
        };

        speedBtn.onclick = () => {
            speedIndex = (speedIndex + 1) % speeds.length;
            sliceWidth = speeds[speedIndex];
            speedBtn.innerText = `${sliceWidth} px`;
        };

        dirBtn.onclick = () => {
            if (running) return; 
            sweepDirection = sweepDirection === "right" ? "left" : "right";
            dirBtn.innerText = sweepDirection === "right" ? "Derecha" : "Izquierda";
            xpos = sweepDirection === "right" ? 0 : pano.width - sliceWidth;
            progress.style.width = "0%";
            slitGuide.style.left = sweepDirection === "right" ? "0%" : "100%";
        };

        camBtn.onclick = async () => {
            if (running) return;
            facingMode = facingMode === "environment" ? "user" : "environment";
            camBtn.innerText = facingMode === "environment" ? "Entorno" : "Usuario";
            await startCamera();
        };

        document.getElementById("saveBtn").onclick = () => {
            const timestamp = () => new Date().toISOString().replace(/[-:]/g, "").replace("T", "_").slice(0, 15);
            const a = document.createElement("a");
            a.href = pano.toDataURL("image/jpeg", 0.92);
            a.download = `scan_${timestamp()}.jpg`;
            a.click();
            hacerRuido();
        };

        function hacerRuido() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(587.33, audioCtx.currentTime);
            oscillator.frequency.setValueAtTime(880.00, audioCtx.currentTime + 0.1);
            gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + 0.3);
        }

        startCamera();
    </script>
</body>

</html>
